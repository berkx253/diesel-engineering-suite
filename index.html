<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diesel Engineering Suite V4.0</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;max-width:1100px;margin:auto;padding:15px}
.card{background:#1d1d1d;border-radius:12px;padding:15px;margin:12px 0}
input{width:100%;padding:10px;margin:4px 0;box-sizing:border-box}
button{width:100%;padding:12px;margin-top:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.out{line-height:1.7}
</style>
</head>
<body>

<h1>Diesel Engineering Suite V4.0</h1>

<div class="card">
<h2>Eingaben</h2>
<div class="grid">
<div>
<label>Hubraum (cm³)</label>
<input id="disp" type="number" value="1896">
<label>Drehzahl (rpm)</label>
<input id="rpm" type="number" value="4000">
<label>IQ (mg/Hub)</label>
<input id="iq" type="number" value="70">
</div>
<div>
<label>Druck absolut (bar)</label>
<input id="pabs" type="number" value="2.6" step="0.1">
<label>IAT (°C)</label>
<input id="iat" type="number" value="35">
<label>VE (%)</label>
<input id="ve" type="number" value="90">
</div>
</div>
<button onclick="calc()">Berechnen</button>
</div>

<div class="card">
<h2>Ergebnisse</h2>
<div id="out" class="out"></div>
</div>

<script>
function calc(){

const disp = parseFloat(document.getElementById('disp').value)/1000000.0;
const rpm = parseFloat(document.getElementById('rpm').value);
const iq = parseFloat(document.getElementById('iq').value);
const pabs = parseFloat(document.getElementById('pabs').value)*100000;
const temp = parseFloat(document.getElementById('iat').value)+273.15;
const ve = parseFloat(document.getElementById('ve').value)/100;

const R=287.05;

// Luftmasse pro Hub (4-Takt)
const airStrokeKg = (pabs * (disp/2) * ve) / (R * temp);
const airStrokeMg = airStrokeKg * 1000000;

const afr = airStrokeMg / iq;
const lambda = afr / 14.5;

let smoke="Sehr sauber";
if(lambda<1.5) smoke="Sauber";
if(lambda<1.3) smoke="Sportlich";
if(lambda<1.15) smoke="Rauch möglich";
if(lambda<1.0) smoke="Starker Rauch";

const pr = pabs / 100000;

// Luftmasse pro Minute
const intakeEventsPerMin = rpm/2;
const airPerMinKg = airStrokeKg * intakeEventsPerMin;

// Kraftstoff pro Minute
const fuelPerMinKg = (iq/1000000) * intakeEventsPerMin;

// Leistungsabschätzung über BSFC 220 g/kWh
const bsfc = 220;
const powerKW = (fuelPerMinKg*60*1000)/bsfc;
const powerPS = powerKW * 1.35962;

// Drehmoment
const torqueNm = (powerKW*9550)/(rpm||1);

// Ziel-Lambda 1.2
const maxIq12 = airStrokeMg/(14.5*1.2);

document.getElementById('out').innerHTML=`
<b>Luftmasse pro Hub:</b> ${airStrokeMg.toFixed(0)} mg/Hub<br>
<b>Luftmasse pro Minute:</b> ${airPerMinKg.toFixed(2)} kg/min<br>
<b>AFR:</b> ${afr.toFixed(2)}<br>
<b>Lambda:</b> ${lambda.toFixed(2)}<br>
<b>Smoke:</b> ${smoke}<br>
<b>Druckverhältnis:</b> ${pr.toFixed(2)}<br>
<b>Max IQ @ Lambda 1.20:</b> ${maxIq12.toFixed(1)} mg/Hub<br>
<hr>
<b>Leistung:</b> ${powerPS.toFixed(0)} PS<br>
<b>Drehmoment:</b> ${torqueNm.toFixed(0)} Nm
`;
}
calc();
</script>
</body>
</html>
