
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diesel Suite Ultimate</title>
<style>
body{font-family:Arial;background:#111;color:#eee;max-width:1200px;margin:auto;padding:10px}
h1,h2{margin:8px 0}
table{width:100%;border-collapse:collapse;margin:10px 0}
th,td{border:1px solid #444;padding:6px}
input,button{width:100%;padding:8px;box-sizing:border-box}
.sec{background:#1d1d1d;padding:12px;border-radius:8px;margin:12px 0}
</style>
<script>
function calcMain(){
 let iq=+document.getElementById('iq').value||70;
 let air=+document.getElementById('air').value||1400;
 let iat=+document.getElementById('iat').value||35;
 let afr=air/iq;
 let lam=afr/14.5;
 let ps=iq*3;
 let nm=ps*1.9;
 document.getElementById('afr').innerText=afr.toFixed(2);
 document.getElementById('lam').innerText=lam.toFixed(2);
 document.getElementById('ps').innerText=ps.toFixed(0);
 document.getElementById('nm').innerText=nm.toFixed(0);
 document.getElementById('maxiq').innerText=(air/(14.5*1.2)).toFixed(1);
 document.getElementById('liq').innerText=(air/(14.5*1.3)).toFixed(1);
 let w=[];
 if(lam<1.0) w.push("Lambda < 1.0");
 if(iq>80) w.push("IQ > 80");
 if(iat>50) w.push("IAT > 50°C");
 document.getElementById('warn').innerHTML=w.length?w.join("<br>"):"Keine Warnungen";
}
function psiq(){let ps=+gps.value||0; psout.innerText=(ps/3).toFixed(1)+" mg/Hub";}
function lamiq(){let a=+lair.value||0,l=+glam.value||1.2; lamout.innerText=(a/(14.5*l)).toFixed(1)+" mg/Hub";}
function afriq(){let a=+aair.value||0,f=+gafr.value||18; afrout.innerText=(a/f).toFixed(1)+" mg/Hub";}
function nmiq(){let n=+gnm.value||0; nmout.innerText=(n/5.7).toFixed(1)+" mg/Hub";}
function torqueiq(){let n=+tnm.value||0; tqout.innerText=(n/5.7).toFixed(1)+" mg/Hub";}
function eoicalc(){let s=+soi.value||0; let d=(+dur.value||900)/180; eoi.innerText=(s+d).toFixed(1)+"°";}
</script>
</head>
<body onload="calcMain()">
<h1>🚀 Diesel Suite Nutzbar</h1>

<div class="sec">
<h2>Eingaben</h2>
<table>
<tr><td>IQ</td><td><input id="iq" value="70"></td></tr>
<tr><td>Luftmasse</td><td><input id="air" value="1400"></td></tr>
<tr><td>IAT</td><td><input id="iat" value="35"></td></tr>
</table>
<button onclick="calcMain()">Hauptwerte berechnen</button>
</div>

<div class="sec">
<h2>Ergebnisse</h2>
<table>
<tr><td>AFR</td><td id="afr"></td></tr>
<tr><td>Lambda</td><td id="lam"></td></tr>
<tr><td>PS</td><td id="ps"></td></tr>
<tr><td>Nm</td><td id="nm"></td></tr>
<tr><td>Max IQ λ1.20</td><td id="maxiq"></td></tr>
<tr><td>Luftlimitierte IQ</td><td id="liq"></td></tr>
</table>
<div id="warn"></div>
</div>

<div class="sec">
<h2>Ziel PS → IQ</h2>
<table><tr><td>Ziel PS</td><td><input id="gps" value="250"></td></tr></table>
<button onclick="psiq()">Berechnen</button>
<div id="psout"></div>

<h2>Ziel Lambda → IQ</h2>
<table><tr><td>Luftmasse</td><td><input id="lair" value="1400"></td></tr><tr><td>Lambda</td><td><input id="glam" value="1.25"></td></tr></table>
<button onclick="lamiq()">Berechnen</button>
<div id="lamout"></div>

<h2>Ziel AFR → IQ</h2>
<table><tr><td>Luftmasse</td><td><input id="aair" value="1400"></td></tr><tr><td>AFR</td><td><input id="gafr" value="18"></td></tr></table>
<button onclick="afriq()">Berechnen</button>
<div id="afrout"></div>

<h2>Ziel Nm → IQ</h2>
<table><tr><td>Nm</td><td><input id="gnm" value="450"></td></tr></table>
<button onclick="nmiq()">Berechnen</button>
<div id="nmout"></div>

<h2>Torque → IQ</h2>
<table><tr><td>Drehmoment</td><td><input id="tnm" value="450"></td></tr></table>
<button onclick="torqueiq()">Berechnen</button>
<div id="tqout"></div>
</div>

<div class="sec">
<h2>SOI / EOI</h2>
<table>
<tr><td>SOI</td><td><input id="soi" value="8"></td></tr>
<tr><td>Einspritzdauer µs</td><td><input id="dur" value="900"></td></tr>
</table>
<button onclick="eoicalc()">EOI berechnen</button>
<div>EOI: <span id="eoi"></span></div>
</div>

</body></html>
